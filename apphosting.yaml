runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: firebase-api-key
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: malloy-data.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: malloy-data
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:347391727005:web:421bbe9d620558667e0b74
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "347391727005"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID
    secret: google-oauth-client-id
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_GOOGLE_PROJECT_ID
    value: malloy-data
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_PROJECT_ID
    value: malloy-data
    availability:
      - BUILD
      - RUNTIME
  - variable: BQ_DATASET
    value: ecomm
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_GENERATIVE_AI_API_KEY
    secret: google-generative-ai-api-key
    availability:
      - BUILD
      - RUNTIME
  - variable: GOOGLE_AI_API_KEY
    secret: google-generative-ai-api-key
    availability:
      - BUILD
      - RUNTIME
