runConfig:
  runtime: nodejs22
  concurrency: 80
  cpu: 1
  memoryMiB: 1024
  minInstances: 0
  maxInstances: 3

env:
  - variable: GOOGLE_CLIENT_ID
    value: 347391727005-up3qo24398bpskrpfds79usrptbsv26m.apps.googleusercontent.com
  - variable: GOOGLE_CLIENT_SECRET
    secret: bigquery-aif-oauth-secret
  - variable: GOOGLE_REDIRECT_URI
    value: https://hey-data-builder.web.app/api/auth/callback
  - variable: FRONTEND_URL
    value: https://hey-data-builder.web.app
  - variable: GOOGLE_CLOUD_PROJECT
    value: malloy-data
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: malloy-data
